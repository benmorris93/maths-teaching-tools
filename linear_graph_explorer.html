<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>y = mx + c Explorer</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f1e8; color: #222; padding: 24px; }
    .container { max-width: 1050px; margin: 0 auto; background: white; border-radius: 28px; padding: 28px; box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
    h1 { text-align: center; font-size: 42px; margin: 0 0 8px; }
    .subtitle { text-align: center; color: #666; font-size: 19px; margin-bottom: 28px; }
    .controls { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-bottom: 24px; }
    .control-card { background: #faf8f3; border-radius: 18px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    label { display: block; font-weight: bold; font-size: 22px; margin-bottom: 12px; }
    input[type="range"] { width: 100%; }
    .equation-wrap { text-align: center; margin-bottom: 24px; }
    .equation { display: inline-block; background: #111; color: white; border-radius: 18px; padding: 16px 28px; font-size: 34px; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.16); }
    .graph-wrap { overflow-x: auto; border: 2px solid #d6d3d1; border-radius: 20px; background: white; }
    svg { display: block; margin: 0 auto; }
    .summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 24px; font-size: 18px; }
    .summary-card { border-radius: 18px; padding: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .summary-title { font-weight: bold; margin-bottom: 8px; }
    .summary-value { font-size: 30px; font-weight: bold; }
    .blue { background: #eff6ff; color: #1d4ed8; }
    .red { background: #fef2f2; color: #b91c1c; }
    .green { background: #f0fdf4; color: #15803d; }
    @media (max-width: 750px) { .controls, .summary { grid-template-columns: 1fr; } h1 { font-size: 32px; } .equation { font-size: 26px; } }
  </style>
</head>
<body>
  <main class="container">
    <h1>y = mx + c Explorer</h1>
    <p class="subtitle">Drag the sliders to explore how the gradient and y-intercept affect the graph.</p>
    <section class="controls">
      <div class="control-card">
        <label for="gradient">Gradient (m): <span id="mValue">1</span></label>
        <input id="gradient" type="range" min="-5" max="5" step="0.1" value="1" />
      </div>
      <div class="control-card">
        <label for="intercept">y-intercept (c): <span id="cValue">0</span></label>
        <input id="intercept" type="range" min="-10" max="10" step="0.1" value="0" />
      </div>
    </section>
    <div class="equation-wrap"><div class="equation" id="equation">y = x</div></div>
    <section class="graph-wrap"><svg id="graph" width="700" height="500" aria-label="Coordinate graph showing y equals mx plus c"></svg></section>
    <section class="summary">
      <div class="summary-card blue"><div class="summary-title">Gradient</div><div class="summary-value" id="gradientSummary">1</div></div>
      <div class="summary-card red"><div class="summary-title">y-intercept</div><div class="summary-value" id="interceptSummary">0</div></div>
      <div class="summary-card green"><div class="summary-title">x-intercept</div><div class="summary-value" id="xInterceptSummary">0</div></div>
    </section>
  </main>
  <script>
    const gradientInput = document.getElementById("gradient");
    const interceptInput = document.getElementById("intercept");
    const mValue = document.getElementById("mValue");
    const cValue = document.getElementById("cValue");
    const equation = document.getElementById("equation");
    const graph = document.getElementById("graph");
    const gradientSummary = document.getElementById("gradientSummary");
    const interceptSummary = document.getElementById("interceptSummary");
    const xInterceptSummary = document.getElementById("xInterceptSummary");
    const width = 700, height = 500, scale = 40, originX = width / 2, originY = height / 2;
    function formatNumber(num, decimals = 1) {
      const rounded = Number(num.toFixed(decimals));
      return Number.isInteger(rounded) ? String(rounded) : String(rounded);
    }
    function xToSvg(x) { return originX + x * scale; }
    function yToSvg(y) { return originY - y * scale; }
    function createSvgElement(type, attributes) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", type);
      Object.entries(attributes).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }
    function updateGraph() {
      const m = Number(gradientInput.value);
      const c = Number(interceptInput.value);
      mValue.textContent = formatNumber(m);
      cValue.textContent = formatNumber(c);
      gradientSummary.textContent = formatNumber(m);
      interceptSummary.textContent = formatNumber(c);
      const sign = c >= 0 ? "+" : "−";
      const absC = formatNumber(Math.abs(c));
      if (m === 1 && c === 0) equation.textContent = "y = x";
      else if (m === -1 && c === 0) equation.textContent = "y = −x";
      else if (c === 0) equation.textContent = `y = ${formatNumber(m)}x`;
      else if (m === 1) equation.textContent = `y = x ${sign} ${absC}`;
      else if (m === -1) equation.textContent = `y = −x ${sign} ${absC}`;
      else equation.textContent = `y = ${formatNumber(m)}x ${sign} ${absC}`;
      graph.innerHTML = "";
      for (let n = -10; n <= 10; n++) {
        graph.appendChild(createSvgElement("line", {x1:xToSvg(n), y1:0, x2:xToSvg(n), y2:height, stroke:"#e5e7eb", "stroke-width":1}));
        graph.appendChild(createSvgElement("line", {x1:0, y1:yToSvg(n), x2:width, y2:yToSvg(n), stroke:"#e5e7eb", "stroke-width":1}));
      }
      graph.appendChild(createSvgElement("line", {x1:0, y1:originY, x2:width, y2:originY, stroke:"black", "stroke-width":3}));
      graph.appendChild(createSvgElement("line", {x1:originX, y1:0, x2:originX, y2:height, stroke:"black", "stroke-width":3}));
      for (let n = -10; n <= 10; n++) {
        if (n !== 0) {
          const xLabel = createSvgElement("text", {x:xToSvg(n), y:originY+20, "text-anchor":"middle", "font-size":14, fill:"#555"});
          xLabel.textContent = n; graph.appendChild(xLabel);
          const yLabel = createSvgElement("text", {x:originX-15, y:yToSvg(n)+5, "text-anchor":"middle", "font-size":14, fill:"#555"});
          yLabel.textContent = n; graph.appendChild(yLabel);
        }
      }
      const points = [];
      for (let x = -10; x <= 10; x += 0.1) points.push(`${xToSvg(x)},${yToSvg(m*x+c)}`);
      graph.appendChild(createSvgElement("polyline", {fill:"none", stroke:"#2563eb", "stroke-width":4, points:points.join(" ")}));
      graph.appendChild(createSvgElement("circle", {cx:xToSvg(0), cy:yToSvg(c), r:7, fill:"#dc2626"}));
      if (m !== 0) {
        const xIntercept = -c / m;
        xInterceptSummary.textContent = formatNumber(xIntercept, 2);
        if (xIntercept >= -10 && xIntercept <= 10) graph.appendChild(createSvgElement("circle", {cx:xToSvg(xIntercept), cy:yToSvg(0), r:7, fill:"#16a34a"}));
      } else {
        xInterceptSummary.textContent = c === 0 ? "all values" : "undefined";
      }
    }
    gradientInput.addEventListener("input", updateGraph);
    interceptInput.addEventListener("input", updateGraph);
    updateGraph();
  </script>
</body>
</html>
